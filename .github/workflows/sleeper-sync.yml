name: Sleeper Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 2"

permissions:
  contents: write

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Sleeper sync
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\sync-sleeper-leagues.ps1

      - name: Validate updated data
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\check-site.ps1 -Strict

      - name: Commit updated league data
        shell: pwsh
        run: |
          if (-not (git diff --quiet -- data/leagues.json)) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/leagues.json
            git commit -m "Sync Sleeper league data"
            git push
          } else {
            Write-Host "No league data changes to commit."
          }
