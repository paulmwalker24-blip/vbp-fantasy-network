name: Power Rankings Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh power rankings
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\sync-power-rankings.ps1 -PublishDrafting

      - name: Validate site
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\check-site.ps1 -Strict

      - name: Commit updated rankings
        shell: pwsh
        run: |
          if (-not (git diff --quiet -- data/power-rankings.json)) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/power-rankings.json
            git commit -m "Sync power rankings"
            git push
          } else {
            Write-Host "No power ranking changes to commit."
          }
